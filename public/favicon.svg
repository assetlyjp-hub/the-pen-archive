<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- ペン先（ニブ）のアイコン: シンプルな万年筆のペン先を表現 -->
  <defs>
    <linearGradient id="nib" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D4B555"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <!-- ペン先本体 -->
  <path d="M16 2 L12 20 L16 28 L20 20 Z" fill="url(#nib)" stroke="#6B5010" stroke-width="0.5"/>
  <!-- ペン先の中心スリット -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="#6B5010" stroke-width="0.8"/>
  <!-- ブリーザーホール（インク穴） -->
  <circle cx="16" cy="10" r="1.2" fill="#1A1A1A"/>
  <!-- ペン先のハイライト -->
  <path d="M14 6 L16 2 L15 14" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.3"/>
</svg>
