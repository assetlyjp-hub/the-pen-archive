<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Subtle light effect -->
  <ellipse cx="400" cy="350" rx="300" ry="250" fill="url(#glow)"/>
  <!-- Decorative line -->
  <line x1="300" y1="330" x2="500" y2="330" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Product name -->
    <text x="400" y="365" font-family="Georgia, serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">Cross</text>
    <text x="400" y="415" font-family="Georgia, serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">Century II</text>
  <!-- Bottom line -->
  <line x1="300" y1="460" x2="500" y2="460" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <!-- "Image coming soon" text -->
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.4" letter-spacing="3">PRODUCT IMAGE</text>
</svg>