<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 万年筆シルエット: プレースホルダー画像 -->
  <rect width="400" height="300" fill="#2D2D2D"/>

  <!-- 万年筆のボディ -->
  <g transform="translate(60, 130)">
    <!-- キャップ -->
    <rect x="0" y="8" width="90" height="24" rx="4" fill="#3A3A3A" stroke="#555" stroke-width="0.5"/>
    <rect x="85" y="6" width="8" height="28" rx="2" fill="#444"/>
    <!-- クリップ -->
    <rect x="10" y="2" width="4" height="36" rx="2" fill="#8B6914" opacity="0.6"/>

    <!-- バレル -->
    <rect x="93" y="10" width="140" height="20" rx="3" fill="#444" stroke="#555" stroke-width="0.5"/>

    <!-- グリップセクション -->
    <rect x="233" y="12" width="40" height="16" rx="2" fill="#3A3A3A" stroke="#555" stroke-width="0.5"/>

    <!-- ペン先 -->
    <polygon points="273,16 310,20 273,24" fill="#8B6914" stroke="#6B5010" stroke-width="0.5"/>
  </g>

  <!-- テキスト -->
  <text x="200" y="240" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="14" fill="#666">
    Fountain Pen
  </text>
</svg>
